<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ceu-casamento" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a35"/>
      <stop offset="60%" stop-color="#2a2248"/>
      <stop offset="100%" stop-color="#1e1830"/>
    </linearGradient>
    <radialGradient id="luz-casamento" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ceu-casamento)"/>
  <rect width="800" height="500" fill="url(#luz-casamento)"/>
  <!-- chão -->
  <rect x="0" y="380" width="800" height="120" fill="#151225"/>
  <!-- arco da igreja simples -->
  <path d="M300 380 L300 180 Q400 100 500 180 L500 380" fill="none" stroke="#2d2548" stroke-width="3"/>
  <path d="M310 380 L310 190 Q400 115 490 190 L490 380" fill="rgba(30,24,48,0.5)" stroke="none"/>
  <!-- cruz no topo -->
  <rect x="395" y="90" width="10" height="30" fill="#c9a84c" opacity="0.6"/>
  <rect x="388" y="98" width="24" height="8" fill="#c9a84c" opacity="0.6"/>
  <!-- Padre Bartolomeu (centro, atrás) -->
  <circle cx="400" cy="220" r="16" fill="#a89070"/>
  <rect x="388" y="236" width="24" height="45" fill="#2d2020" rx="3"/>
  <!-- braços do padre (a abençoar) -->
  <line x1="388" y1="250" x2="360" y2="240" stroke="#2d2020" stroke-width="4" stroke-linecap="round"/>
  <line x1="412" y1="250" x2="440" y2="240" stroke="#2d2020" stroke-width="4" stroke-linecap="round"/>
  <!-- Blimunda (esquerda) -->
  <circle cx="350" cy="280" r="22" fill="#dfc06a"/>
  <rect x="337" y="302" width="26" height="50" fill="#6a3a4a" rx="3"/>
  <rect x="330" y="352" width="12" height="28" fill="#6a3a4a" rx="2"/>
  <rect x="356" y="352" width="12" height="28" fill="#6a3a4a" rx="2"/>
  <circle cx="344" cy="277" r="2.5" fill="#0d0d1a"/>
  <circle cx="356" cy="277" r="2.5" fill="#0d0d1a"/>
  <!-- Baltasar (direita) -->
  <circle cx="450" cy="278" r="22" fill="#c9a84c"/>
  <rect x="437" y="300" width="26" height="50" fill="#3d4a60" rx="3"/>
  <rect x="430" y="350" width="12" height="30" fill="#3d4a60" rx="2"/>
  <rect x="458" y="350" width="12" height="30" fill="#3d4a60" rx="2"/>
  <circle cx="444" cy="275" r="2.5" fill="#0d0d1a"/>
  <circle cx="456" cy="275" r="2.5" fill="#0d0d1a"/>
  <!-- mãos dadas (símbolo de união) -->
  <line x1="363" y1="315" x2="390" y2="310" stroke="#dfc06a" stroke-width="4" stroke-linecap="round"/>
  <line x1="437" y1="313" x2="410" y2="310" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <!-- coração entre eles -->
  <path d="M396 300 Q400 292 406 300 Q408 308 400 316 Q392 308 394 300 Z" fill="#c0392b" opacity="0.7"/>
  <!-- velas decorativas -->
  <rect x="320" y="340" width="5" height="15" fill="#e8dfd0"/>
  <ellipse cx="322" cy="338" rx="3" ry="5" fill="#c9a84c" opacity="0.6"/>
  <rect x="475" y="340" width="5" height="15" fill="#e8dfd0"/>
  <ellipse cx="477" cy="338" rx="3" ry="5" fill="#c9a84c" opacity="0.6"/>
</svg>