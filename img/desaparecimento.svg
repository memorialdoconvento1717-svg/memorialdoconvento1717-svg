<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ceu-noite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="70%" stop-color="#1a1a35"/>
      <stop offset="100%" stop-color="#252040"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ceu-noite)"/>
  <!-- estrelas -->
  <circle cx="80" cy="50" r="1.2" fill="#e0c068" opacity="0.5"/>
  <circle cx="200" cy="30" r="1" fill="#c9a84c" opacity="0.3"/>
  <circle cx="500" cy="60" r="1.5" fill="#c9a84c" opacity="0.4"/>
  <circle cx="650" cy="40" r="1" fill="#e0c068" opacity="0.5"/>
  <circle cx="750" cy="70" r="0.8" fill="#c9a84c" opacity="0.3"/>
  <!-- paisagem -->
  <path d="M0 400 Q200 370 400 390 Q600 410 800 380 L800 500 L0 500 Z" fill="#151225"/>
  <!-- Baltasar pequeno a voar na passarola (canto superior direito) -->
  <!-- passarola a voar distante -->
  <g transform="translate(550, 120) scale(0.5)">
    <ellipse cx="0" cy="0" rx="80" ry="25" fill="#3d4a60" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M-80 0 Q-110 -40 -130 -20 Q-110 -25 -80 -10" fill="#4a5a70" stroke="#c9a84c" stroke-width="1"/>
    <path d="M80 0 Q110 -40 130 -20 Q110 -25 80 -10" fill="#4a5a70" stroke="#c9a84c" stroke-width="1"/>
    <rect x="-5" y="-30" width="10" height="30" fill="#c9a84c" opacity="0.5" rx="2"/>
    <circle cx="0" cy="-2" r="8" fill="#c9a84c" opacity="0.3"/>
  </g>
  <!-- rastro da passarola -->
  <line x1="550" y1="125" x2="400" y2="180" stroke="#c9a84c" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 6"/>
  <line x1="400" y1="180" x2="300" y2="220" stroke="#c9a84c" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Blimunda em baixo, olhando para cima -->
  <circle cx="300" cy="330" r="22" fill="#dfc06a"/>
  <rect x="287" y="352" width="26" height="50" fill="#6a3a4a" rx="3"/>
  <rect x="280" y="402" width="12" height="28" fill="#6a3a4a" rx="2"/>
  <rect x="306" y="402" width="12" height="28" fill="#6a3a4a" rx="2"/>
  <!-- olhos olhando para cima -->
  <circle cx="294" cy="326" r="3" fill="#0d0d1a"/>
  <circle cx="306" cy="326" r="3" fill="#0d0d1a"/>
  <circle cx="294" cy="324.5" r="1.2" fill="#c9a84c"/>
  <circle cx="306" cy="324.5" r="1.2" fill="#c9a84c"/>
  <!-- mão estendida para o céu -->
  <line x1="313" y1="362" x2="340" y2="340" stroke="#dfc06a" stroke-width="4" stroke-linecap="round"/>
  <!-- lua -->
  <circle cx="680" cy="80" r="25" fill="#dfc06a" opacity="0.15"/>
  <circle cx="690" cy="75" r="22" fill="#0d0d1a"/>
</svg>