<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ceu-fim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#2a1520"/>
    </linearGradient>
    <linearGradient id="fogo-final" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e07030"/>
      <stop offset="100%" stop-color="#c03020"/>
    </linearGradient>
    <radialGradient id="aura-vontade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.4)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ceu-fim)"/>
  <!-- chão escuro -->
  <rect x="0" y="370" width="800" height="130" fill="#150a10"/>
  <!-- multidão sombria -->
  <circle cx="120" cy="380" r="10" fill="#1a1018"/>
  <rect x="113" y="390" width="14" height="20" fill="#1a1018" rx="2"/>
  <circle cx="155" cy="385" r="9" fill="#1a0f15"/>
  <rect x="149" y="394" width="12" height="18" fill="#1a0f15" rx="2"/>
  <circle cx="640" cy="378" r="10" fill="#1a1018"/>
  <rect x="633" y="388" width="14" height="20" fill="#1a1018" rx="2"/>
  <circle cx="680" cy="383" r="9" fill="#1a0f15"/>
  <rect x="674" y="392" width="12" height="18" fill="#1a0f15" rx="2"/>
  <!-- estaca -->
  <rect x="393" y="180" width="14" height="130" fill="#5a4030"/>
  <!-- chamas mais intensas -->
  <ellipse cx="400" cy="320" rx="60" ry="20" fill="#c9a84c" opacity="0.2"/>
  <path d="M370 310 Q380 260 400 245 Q420 260 430 310 Z" fill="url(#fogo-final)" opacity="0.6"/>
  <path d="M380 315 Q390 275 400 260 Q410 275 420 315 Z" fill="#e0c068" opacity="0.5"/>
  <path d="M390 318 Q395 285 400 275 Q405 285 410 318 Z" fill="#c9a84c" opacity="0.4"/>
  <!-- Baltasar (na estaca) -->
  <circle cx="400" cy="218" r="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="388" y="236" width="24" height="40" fill="#3d4a60" opacity="0.7" rx="3"/>
  <circle cx="394" cy="215" r="2.5" fill="#0d0d1a" opacity="0.7"/>
  <circle cx="406" cy="215" r="2.5" fill="#0d0d1a" opacity="0.7"/>
  <!-- Blimunda (em frente, recolhendo a vontade) -->
  <circle cx="300" cy="310" r="22" fill="#dfc06a"/>
  <rect x="287" y="332" width="26" height="45" fill="#6a3a4a" rx="3"/>
  <!-- olhos com brilho especial -->
  <circle cx="294" cy="307" r="3" fill="#0d0d1a"/>
  <circle cx="306" cy="307" r="3" fill="#0d0d1a"/>
  <circle cx="295" cy="306" r="1.5" fill="#c9a84c"/>
  <circle cx="307" cy="306" r="1.5" fill="#c9a84c"/>
  <!-- mão estendida para Baltasar -->
  <line x1="313" y1="345" x2="350" y2="330" stroke="#dfc06a" stroke-width="4" stroke-linecap="round"/>
  <!-- a vontade a ser recolhida (esfera dourada) -->
  <circle cx="370" cy="280" r="18" fill="url(#aura-vontade)"/>
  <circle cx="370" cy="280" r="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1"/>
  <circle cx="370" cy="280" r="3" fill="#c9a84c" opacity="0.6"/>
  <!-- linha da vontade (de Baltasar para Blimunda) -->
  <line x1="400" y1="240" x2="372" y2="278" stroke="#c9a84c" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="368" y1="282" x2="340" y2="310" stroke="#c9a84c" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- cruz sinistra -->
  <rect x="394" y="150" width="12" height="35" fill="#3a2a20" rx="1"/>
  <rect x="385" y="158" width="30" height="10" fill="#3a2a20" rx="1"/>
</svg>