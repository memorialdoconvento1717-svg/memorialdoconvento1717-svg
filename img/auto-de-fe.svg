<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a35"/>
      <stop offset="100%" stop-color="#2a2040"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e07030"/>
    </linearGradient>
  </defs>
  <!-- fundo -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- praça / chão -->
  <rect x="0" y="350" width="800" height="150" fill="#1e1830" rx="0"/>
  <rect x="0" y="350" width="800" height="6" fill="#2a2548"/>
  <!-- palco / plataforma -->
  <rect x="250" y="300" width="300" height="55" fill="#2d2545" rx="3"/>
  <rect x="260" y="296" width="280" height="8" fill="#382e55" rx="2"/>
  <!-- estaca central -->
  <rect x="393" y="200" width="14" height="105" fill="#5a4a3a"/>
  <!-- chamas -->
  <ellipse cx="400" cy="310" rx="50" ry="18" fill="#c9a84c" opacity="0.3"/>
  <path d="M380 300 Q385 270 400 260 Q415 270 420 300 Z" fill="url(#fire)" opacity="0.7"/>
  <path d="M388 305 Q393 280 400 272 Q407 280 412 305 Z" fill="#e0c068" opacity="0.6"/>
  <!-- multidão (silhuetas) -->
  <circle cx="150" cy="370" r="12" fill="#252040"/>
  <rect x="142" y="382" width="16" height="25" fill="#252040" rx="3"/>
  <circle cx="180" cy="375" r="11" fill="#201a38"/>
  <rect x="173" y="386" width="14" height="22" fill="#201a38" rx="3"/>
  <circle cx="620" cy="368" r="12" fill="#252040"/>
  <rect x="612" y="380" width="16" height="25" fill="#252040" rx="3"/>
  <circle cx="660" cy="374" r="11" fill="#201a38"/>
  <rect x="653" y="385" width="14" height="22" fill="#201a38" rx="3"/>
  <circle cx="120" cy="380" r="10" fill="#1e1830"/>
  <rect x="113" y="390" width="14" height="20" fill="#1e1830" rx="2"/>
  <circle cx="690" cy="378" r="10" fill="#1e1830"/>
  <rect x="683" y="388" width="14" height="20" fill="#1e1830" rx="2"/>
  <!-- Blimunda (esquerda, olhando) -->
  <circle cx="310" cy="340" r="14" fill="#dfc06a"/>
  <rect x="300" y="354" width="20" height="35" fill="#6a3a4a" rx="3"/>
  <!-- olhos de Blimunda (a ver) -->
  <circle cx="306" cy="337" r="2.5" fill="#0d0d1a"/>
  <circle cx="314" cy="337" r="2.5" fill="#0d0d1a"/>
  <!-- Baltasar (direita, olhando para Blimunda) -->
  <circle cx="490" cy="342" r="14" fill="#c9a84c"/>
  <rect x="480" y="356" width="20" height="35" fill="#3d4a60" rx="3"/>
  <!-- olhos de Baltasar -->
  <circle cx="486" cy="339" r="2.5" fill="#0d0d1a"/>
  <circle cx="494" cy="339" r="2.5" fill="#0d0d1a"/>
  <!-- gancho -->
  <line x1="478" y1="365" x2="468" y2="375" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <path d="M466 374 Q462 380 468 382" stroke="#888" stroke-width="2" fill="none"/>
  <!-- linha de olhar (invisível, simbólica) -->
  <line x1="318" y1="338" x2="482" y2="340" stroke="rgba(201,168,76,0.15)" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- olho simbólico (hotspot target) -->
  <g transform="translate(400, 320)">
    <ellipse cx="0" cy="0" rx="12" ry="7" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#c9a84c" opacity="0.5"/>
  </g>
  <!-- cruz da Inquisição -->
  <rect x="390" y="160" width="20" height="40" fill="#4a3a5a" rx="2"/>
  <rect x="380" y="170" width="40" height="12" fill="#4a3a5a" rx="2"/>
</svg>