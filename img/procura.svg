<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ceu-procura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#2a2040"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ceu-procura)"/>
  <!-- paisagem — estrada longa -->
  <path d="M0 420 Q200 400 400 410 Q600 420 800 390 L800 500 L0 500 Z" fill="#151225"/>
  <!-- estrada -->
  <path d="M100 450 Q300 420 500 440 Q650 450 800 420" stroke="#2a2548" stroke-width="3" fill="none"/>
  <path d="M100 450 Q300 430 480 440" stroke="#2a2548" stroke-width="1.5" fill="none" stroke-dasharray="8 8" opacity="0.4"/>
  <!-- colinas distantes -->
  <path d="M0 400 Q100 360 200 380 Q300 350 400 370 Q500 340 600 360 Q700 350 800 370 L800 420 Q600 420 400 410 Q200 400 0 420 Z" fill="#1a1530" opacity="0.7"/>
  <!-- árvores simples -->
  <rect x="580" y="340" width="6" height="35" fill="#2d2548"/>
  <circle cx="583" cy="330" r="15" fill="#252040"/>
  <rect x="650" y="350" width="5" height="30" fill="#2d2548"/>
  <circle cx="652" cy="342" r="12" fill="#201a38"/>
  <rect x="160" y="355" width="5" height="25" fill="#2d2548"/>
  <circle cx="162" cy="348" r="11" fill="#252040"/>
  <!-- sol/lua no horizonte -->
  <circle cx="700" cy="200" r="35" fill="#c9a84c" opacity="0.08"/>
  <circle cx="700" cy="200" r="20" fill="#dfc06a" opacity="0.12"/>
  <!-- Blimunda a caminhar (posição mais à esquerda, de viagem) -->
  <circle cx="260" cy="350" r="20" fill="#dfc06a"/>
  <rect x="248" y="370" width="24" height="45" fill="#6a3a4a" rx="3"/>
  <!-- pernas em movimento -->
  <line x1="256" y1="415" x2="248" y2="445" stroke="#6a3a4a" stroke-width="5" stroke-linecap="round"/>
  <line x1="268" y1="415" x2="278" y2="443" stroke="#6a3a4a" stroke-width="5" stroke-linecap="round"/>
  <!-- olhos determinados -->
  <circle cx="254" cy="347" r="2.5" fill="#0d0d1a"/>
  <circle cx="266" cy="347" r="2.5" fill="#0d0d1a"/>
  <circle cx="255" cy="346" r="1" fill="#c9a84c"/>
  <circle cx="267" cy="346" r="1" fill="#c9a84c"/>
  <!-- cajado/bastão -->
  <line x1="240" y1="375" x2="230" y2="440" stroke="#5a4a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- pegadas atrás -->
  <ellipse cx="220" cy="448" rx="4" ry="2" fill="#2a2548" opacity="0.4"/>
  <ellipse cx="200" cy="450" rx="4" ry="2" fill="#2a2548" opacity="0.3"/>
  <ellipse cx="178" cy="451" rx="4" ry="2" fill="#2a2548" opacity="0.2"/>
  <!-- texto simbólico: 9 anos (nove pontos) -->
  <g transform="translate(400, 180)">
    <circle cx="-40" cy="0" r="3" fill="#c9a84c" opacity="0.25"/>
    <circle cx="-20" cy="0" r="3" fill="#c9a84c" opacity="0.3"/>
    <circle cx="0" cy="0" r="3" fill="#c9a84c" opacity="0.35"/>
    <circle cx="20" cy="0" r="3" fill="#c9a84c" opacity="0.4"/>
    <circle cx="40" cy="0" r="3" fill="#c9a84c" opacity="0.45"/>
    <circle cx="-30" cy="20" r="3" fill="#c9a84c" opacity="0.5"/>
    <circle cx="-10" cy="20" r="3" fill="#c9a84c" opacity="0.55"/>
    <circle cx="10" cy="20" r="3" fill="#c9a84c" opacity="0.6"/>
    <circle cx="30" cy="20" r="3" fill="#c9a84c" opacity="0.65"/>
  </g>
</svg>